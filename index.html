<!doctype html>
<html lang="de">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recruiting-Cockpit Peter & Martina Kücken</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#102a43">
  <link rel="stylesheet" href="style.v190.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="favicon.png" alt="App-Logo">
      <div><h1>Recruiting-Cockpit</h1><p>Peter & Martina Kücken</p></div>
    </div>
    <div class="top-actions"><span id="syncStatus" class="sync-status">Nicht angemeldet</span><span id="userInfo" class="user-info hidden"></span><button id="logoutBtn" class="ghost hidden">Abmelden</button><button id="resetBtn" class="ghost hidden">Heute zurücksetzen</button></div>
  </header>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img class="login-logo" src="favicon.png" alt="App-Logo">
      <h2>Recruiting-Cockpit</h2>
      <p>Bitte melde dich mit deiner E-Mail-Adresse an.</p>
      <label>E-Mail</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="peter@kuecken.eu">
      <label>Passwort</label>
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Passwort">
      <button id="loginBtn" class="login-btn">Anmelden</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </section>
  <main class="layout hidden" id="appLayout">
    <aside class="sidebar">
      <input id="searchInput" type="search" placeholder="Suchen, z. B. Einwand, Video 12, LinkedIn">
      <nav id="nav"></nav>
    </aside>
    <section class="content"><div id="view"></div></section>
  </main>
  <footer id="appFooter" class="hidden">© Peter & Martina Kücken</footer>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="content.v182.js"></script>
  <script src="app.v190.js"></script>
</body>
</html>
